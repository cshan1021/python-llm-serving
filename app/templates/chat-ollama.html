<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat Client</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/chat.css') }}">
</head>
<body>

<div id="sidebar" style="background: #2c3e50;">
    <h3>Ollama Settings</h3>
    <div class="config-group">
        <label>API Base URL</label>
        <input type="text" id="apiBase" value="http://localhost:11434">
    </div>
    <div class="config-group">
        <label>Model Name</label>
        <input type="text" id="modelName" value="gemma4:e2b">
    </div>
    <hr style="width: 100%; border: 0.5px solid #444;">
    <p style="font-size: 12px; color: #95a5a6;">Note: Ensure CORS is enabled on your Ollama server.</p>
</div>

<div id="chat-container">
    <div id="messages">
        <div class="message assistant-message">설정을 완료한 후 대화를 시작하세요! 이미지를 드래그하여 첨부할 수 있습니다.</div>
    </div>

    <div id="input-area">
        <div id="drop-zone">이미지를 클릭하거나 여기에 드래그하세요 (클릭 시 파일 선택)</div>
        <div id="preview-container"></div>
        
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="메시지를 입력하세요..."></textarea>
            <button id="sendBtn">전송</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display: none;">

<script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('preview-container');
    
    let attachedImagesBase64 = []; 
    let chatHistory = []; // Ollama 규격에 맞춘 대화 히스토리

    // --- 파일 처리 (기존과 동일) ---
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }));
    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

    function handleFiles(files) {
        Array.from(files).forEach(file => {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    attachedImagesBase64.push(e.target.result);
                    addPreview(e.target.result);
                };
            }
        });
    }

    function addPreview(src) {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `<img src="${src}"><span class="remove-btn">×</span>`;
        div.querySelector('.remove-btn').onclick = () => {
            attachedImagesBase64 = attachedImagesBase64.filter(i => i !== src);
            div.remove();
        };
        previewContainer.appendChild(div);
    }

    // --- Ollama 채팅 로직 ---
    async function sendMessage() {
        const text = userInput.value.trim();
        // Ollama는 로컬 실행 시 보통 API Key가 필요 없으나, 프록시 설정에 따라 유지 가능
        //const apiKey = document.getElementById('apiKey').value;
        if (!text && attachedImagesBase64.length === 0) return;

        const apiBase = document.getElementById('apiBase').value.replace(/\/$/, "");
        const model = document.getElementById('modelName').value;

        // 1. Ollama용 메시지 구조 생성
        // Ollama는 이미지를 base64 데이터만(접두어 data:image/png;base64, 제거) images 배열로 받습니다.
        const msgImages = attachedImagesBase64.map(base64 => base64.split(',')[1]);
        
        const userMsgObj = { 
            role: "user", 
            content: text,
            ...(msgImages.length > 0 && { images: msgImages })
        };
        
        chatHistory.push(userMsgObj);

        // UI 업데이트
        appendMessage('user', text, [...attachedImagesBase64]);
        
        userInput.value = '';
        const currentImages = [...attachedImagesBase64]; // UI용 백업
        attachedImagesBase64 = []; 
        previewContainer.innerHTML = '';

        try {
            // Ollama 기본 엔드포인트는 /api/chat 입니다.
            const response = await fetch(`/api/v1/proxy?${apiBase}/api/chat`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                    // 'Authorization' 헤더는 Ollama 기본 설정에선 필요 없으므로 상황에 따라 제거/유지
                },
                body: JSON.stringify({
                    model: model,
                    messages: chatHistory,
                    stream: true
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Ollama 호출 실패');
            }

            const aiMsgDiv = appendMessage('assistant', '');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let assistantText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                // Ollama 스트림은 각 행이 독립된 JSON 객체입니다.
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (!line.trim()) continue;

                    try {
                        const json = JSON.parse(line);
                        
                        if (json.message && json.message.content) {
                            const content = json.message.content;
                            assistantText += content;
                            aiMsgDiv.innerText = assistantText;
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }

                        if (json.done) {
                            // 대화 종료 시 히스토리에 추가
                            chatHistory.push({ role: "assistant", content: assistantText });
                        }
                    } catch (e) { 
                        console.error("JSON 파싱 에러:", e, "Line:", line); 
                    }
                }
            }

        } catch (error) {
            appendMessage('assistant', '에러 발생: ' + error.message);
        }
    }

    function appendMessage(role, text, images = []) {
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        div.innerText = text;

        images.forEach(imgSrc => {
            const img = document.createElement('img');
            img.src = imgSrc;
            div.appendChild(img);
        });

        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return div;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
