<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 분석 테스트</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>이미지 분석 테스트</h1>
            <p>라벨 사진들을 드래그하여 한 번에 분석하세요.</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label class="label">분석 모델 선택</label>
                <div class="select-wrapper">
                    <select id="modelSelect">
                        <option value="gemma4:e4b">Gemma4</option>
                        <option value="qwen3.5:2b">Qwen3.5</option>
                        <option value="llama3.2-vision">Llama3.2</option>
                        <option value="llava:7b">LLaVA</option>
                    </select>
                    <svg class="select-arrow" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label class="label">이미지 업로드 (다중 선택/드래그 가능)</label>
                <div id="dropZone" class="drop-zone" 
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)" 
                     ondrop="handleDrop(event)"
                     onclick="document.getElementById('imageInput').click()">
                    
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p style="margin: 0; font-size: 0.875rem; font-weight: 600; color: #6b7280;">클릭하거나 파일을 이 곳으로 드래그하세요</p>
                    <p style="margin: 4px 0 0; font-size: 0.75rem; color: #9ca3af;">PNG, JPG, JPEG</p>
                    <input type="file" id="imageInput" class="hidden" accept="image/*" multiple onchange="handleFileSelect(this)" />
                </div>
            </div>

            <div id="previewWrapper" class="hidden" style="margin-bottom: 32px;">
                <h3 style="font-size: 0.875rem; font-weight: 600; color: #4b5563; text-align: center; margin-bottom: 12px;">선택된 이미지 미리보기</h3>
                <div id="imagePreviewGrid" class="preview-grid"></div>
            </div>

            <div class="btn-group">
                <button onclick="resetAll()" class="btn-reset">초기화</button>
                <button onclick="startAnalysis()" id="submitBtn" class="btn-submit">분석 시작하기</button>
            </div>

            <div id="loadingArea" class="loader-area hidden">
                <div class="spinner"></div>
                <p class="pulse"><span id="loadingModelName">AI</span> 분석 중입니다. 잠시만 기다려주세요...</p>
            </div>

            <div id="resultArea" class="result-area hidden">
                <h2 class="result-title"><span></span>분석 리포트</h2>
                <div id="resultList"></div>
            </div>
        </div>
    </div>

    <script>
        // 스크립트 로직은 기존과 동일하되, 클래스 제어 부분만 스타일에 맞춰 유지됩니다.
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('imageInput');
        const modelSelect = document.getElementById('modelSelect');

        function handleDragOver(e) {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect(fileInput);
            }
        }

        function handleFileSelect(input) {
            const wrapper = document.getElementById('previewWrapper');
            const grid = document.getElementById('imagePreviewGrid');
            grid.innerHTML = '';

            if (input.files && input.files.length > 0) {
                wrapper.classList.remove('hidden');
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = "preview-item";
                        div.innerHTML = `<img src="${e.target.result}">`;
                        grid.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                wrapper.classList.add('hidden');
            }
        }

        function resetAll() {
            fileInput.value = "";
            document.getElementById('previewWrapper').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('loadingArea').classList.add('hidden');
            document.getElementById('resultList').innerHTML = '';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').classList.remove('opacity-50');
        }

        async function startAnalysis() {
            const submitBtn = document.getElementById('submitBtn');
            const loadingArea = document.getElementById('loadingArea');
            const resultArea = document.getElementById('resultArea');
            const resultList = document.getElementById('resultList');

            if (!fileInput.files || fileInput.files.length === 0) {
                alert("분석할 이미지를 선택하거나 드래그해 주세요.");
                return;
            }

            document.getElementById('loadingModelName').innerText = modelSelect.options[modelSelect.selectedIndex].text;
            loadingArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            submitBtn.disabled = true;

            // 시뮬레이션 또는 실제 fetch 로직 (기존과 동일)
            try {
                const formData = new FormData();
                formData.append('model', modelSelect.value);
                Array.from(fileInput.files).forEach(file => formData.append('files', file));

                const response = await fetch('/api/v1/analyze_images', { method: 'POST', body: formData });
                const res = await response.json();

                if (response.ok && res.status === "success") {
                    res.data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = "report-card";
                        card.innerHTML = `
                            <div style="margin-bottom: 12px;"><span style="background:#dbeafe; color:#2563eb; font-size:10px; font-weight:bold; padding:4px 8px; border-radius:4px;">이미지 #${item.idx + 1}</span></div>
                            <div class="summary-box">
                                <div class="box-label">Summary</div>
                                <p class="text-content" style="margin:0; font-weight:600;">${item.summary || '정보 없음'}</p>
                            </div>
                            <div class="content-box">
                                <div class="box-label">Content</div>
                                <div class="text-content">${item.content || '추출 데이터 없음'}</div>
                            </div>
                        `;
                        resultList.appendChild(card);
                    });
                    resultArea.classList.remove('hidden');
                }
            } catch (e) {
                alert("오류 발생: " + e.message);
            } finally {
                loadingArea.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
